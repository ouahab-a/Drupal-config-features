content_entity_example.contact_settings:
  path: '/admin/structure/content_entity_example_contact_settings'
  defaults:
    _form: '\Drupal\content_entity_example\Form\ContactSettingsForm'
    _title: 'Contact settings'
  requirements:
    _permission: 'administer contact entity'

content_entity_example.contact_add:
  path: '/content_entity_example_contact/add'
  defaults:
    # Calls the form's 'add' controller, defined in the contact entity.
    _entity_form: content_entity_example_contact.add
    _title: 'Add contact'
  requirements:
    # Use the entity's access controller. _entity_create_access tells the router
    # to use the access controller's checkCreateAccess() method instead of
    # checkAccess().
    _entity_create_access: 'content_entity_example_contact'
entity.news.settings:
  path: 'admin/structure/news'
  defaults:
    _form: '\Drupal\content_entity_example\Form\NewsSettingsForm'
    _title: 'News'
  requirements:
    _permission: 'administer news'

content_entity_example.entity_crud:
  path: '/crud'
  defaults:
    _title: 'Entity Crud'
    _controller: '\Drupal\content_entity_example\Controller\EntityCrudController:build'
  requirements:
    _permission: 'access content'

transcode_profile.settings:
  path: '/admin/config/media/transcode_profile/settings'
  defaults:
    _title: 'Transcode profile settings'
    _form: 'Drupal\content_entity_example\Form\SettingsForm'
  requirements:
    _permission: 'administer site configuration'

entity.video_preset.collection:
  path: '/admin/structure/video-preset'
  defaults:
    _entity_list: 'video_preset'
    _title: 'Video preset configuration'
  requirements:
    _permission: 'administer video_preset'

entity.video_preset.add_form:
  path: '/admin/structure/video_preset/add'
  defaults:
    _entity_form: 'video_preset.add'
    _title: 'Add a video preset'
  requirements:
    _permission: 'administer video_preset'

entity.video_preset.edit_form:
  path: '/admin/structure/video-preset/{video_preset}'
  defaults:
    _entity_form: 'video_preset.edit'
    _title: 'Edit a video preset'
  requirements:
    _permission: 'administer video_preset'

entity.video_preset.delete_form:
  path: '/admin/structure/video-preset/{video_preset}/delete'
  defaults:
    _entity_form: 'video_preset.delete'
    _title: 'Delete a video preset'
  requirements:
    _permission: 'administer video_preset'
